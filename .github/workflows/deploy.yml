##############################################################################
# Snowflake CICD — consumes the database module from snowflake-terraform
#
# Secrets required (Settings → Secrets → Actions):
#   SNOWFLAKE_ACCOUNT   e.g.  ABC12345.us-east-1
#   SNOWFLAKE_USER      e.g.  MYUSERNAME
#   SNOWFLAKE_PASSWORD  e.g.  MyPassword123!
#   GH_PAT              Personal Access Token with repo scope
##############################################################################
name: Snowflake Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan

jobs:
  plan:
    name: Terraform Plan
    runs-on: self-hosted
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    steps:
      - name: Pre-clean workspace
        run: |
          rm -rf .terraform
          rm -rf .terraform.lock.hcl
          rm -f terraform.tfstate terraform.tfstate.backup
          echo "Workspace clean"

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure git auth
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com" > ~/.git-credentials

      - run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="snowflake_organization=${{ secrets.SNOWFLAKE_ORGANIZATION }}" \
            -var="snowflake_account=${{ secrets.SNOWFLAKE_ACCOUNT }}" \
            -var="snowflake_user=${{ secrets.SNOWFLAKE_USER }}" \
            -var="snowflake_password=${{ secrets.SNOWFLAKE_PASSWORD }}" \
            -no-color

      - name: Post-clean workspace
        if: always()
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          rm -f ~/.git-credentials
          echo "Post-clean done"

  apply:
    name: Terraform Apply
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    steps:
      - name: Pre-clean workspace
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          rm -f terraform.tfstate terraform.tfstate.backup
          echo "Workspace clean"

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure git auth
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com" > ~/.git-credentials

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: terraform.tfstate
          key: tfstate-${{ github.ref_name }}
          restore-keys: tfstate-

      - run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="snowflake_organization=${{ secrets.SNOWFLAKE_ORGANIZATION }}" \
            -var="snowflake_account=${{ secrets.SNOWFLAKE_ACCOUNT }}" \
            -var="snowflake_user=${{ secrets.SNOWFLAKE_USER }}" \
            -var="snowflake_password=${{ secrets.SNOWFLAKE_PASSWORD }}"

      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: terraform.tfstate
          key: tfstate-${{ github.ref_name }}

      - run: terraform output

      - name: Post-clean workspace
        if: always()
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          rm -f ~/.git-credentials
          echo "Post-clean done"

  destroy:
    name: Terraform Destroy
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    steps:
      - name: Pre-clean workspace
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          rm -f terraform.tfstate terraform.tfstate.backup
          echo "Workspace clean"

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure git auth
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com" > ~/.git-credentials

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: terraform.tfstate
          key: tfstate-${{ github.ref_name }}
          restore-keys: tfstate-

      - run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="snowflake_organization=${{ secrets.SNOWFLAKE_ORGANIZATION }}" \
            -var="snowflake_account=${{ secrets.SNOWFLAKE_ACCOUNT }}" \
            -var="snowflake_user=${{ secrets.SNOWFLAKE_USER }}" \
            -var="snowflake_password=${{ secrets.SNOWFLAKE_PASSWORD }}"

      - name: Post-clean workspace
        if: always()
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          rm -f ~/.git-credentials
          echo "Post-clean done"
